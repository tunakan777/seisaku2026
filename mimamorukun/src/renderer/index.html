<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>mimamorukun</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:"
    />
    <link href="./assets/main.css" type="text/css" rel="stylesheet" />
    <style>
      .page { display: none; }
      .page h2 { margin-bottom: 16px; }
      button { margin: 4px; padding: 8px 16px; cursor: pointer; }
      ul { list-style: none; padding: 0; }
      li { margin: 8px 0; }
      select { padding: 6px; margin: 4px; }
      p { margin: 8px 0; }
      #meterWrapper {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 16px 0;
      }
      #meterContainer {
        flex: 1;
        height: 40px;
        background: #e5e7eb;
        border-radius: 4px;
        overflow: hidden;
        border: 2px solid #999;
      }
      #meterFill {
        height: 100%;
        width: 0%;
        background: #22c55e;
        transition: width 0.3s ease;
      }
      #meterPercent {
        font-size: 20px;
        font-weight: bold;
        min-width: 50px;
        text-align: right;
      }
    </style>
  </head>

  <body>
    <div id="app">

      <!-- 画面1: 認証 -->
      <div id="pagegit1" class="page">
        <h2>GitHubにログイン</h2>
        <button id="loginBtn">GitHubでログイン</button>
        <p id="authStatus"></p>
        <p>GitHubで以下のコードを入力してください：</p>
        <p id="userCode" style="font-size: 24px; font-weight: bold; letter-spacing: 4px;"></p>
        <button id="copyBtn" style="display: none;">コードをコピー</button>
      </div>

      <!-- 画面2: リポジトリ管理 -->
      <div id="pagegit2" class="page">
        <h2>リポジトリ管理</h2>
        <h3>登録済みリポジトリ（最大5個）</h3>
        <ul id="registeredList"></ul>
        <select id="repoSelect">
          <option value="">リポジトリを選択...</option>
        </select>
        <button id="addRepoBtn">追加</button>
        <p id="repoMessage"></p>
        <hr />
        <button id="toPage3Btn">次へ →</button>
        <button id="logoutBtn">ログアウト</button>
      </div>

      <!-- 画面3: データ取得 -->
      <div id="pagegit3" class="page">
        <h2>データ取得</h2>
        <h3>取得するリポジトリを選択</h3>
        <ul id="checkList"></ul>
        <button id="fetchBtn">データを取得して保存</button>
        <p id="fetchStatus"></p>
        <hr />
        <button id="toPage2Btn">← 前へ</button>
      </div>

      <!-- 画面4: 崩壊度メーター -->
      <div id="pageresult" class="page">
        <h2>崩壊度メーター</h2>
        <p id="meterLabel" style="font-size: 18px; font-weight: bold;"></p>
        <div id="meterWrapper">
          <div id="meterContainer">
            <div id="meterFill"></div>
          </div>
          <div id="meterPercent">0%</div>
        </div>
        <div id="statsContainer"></div>
        <hr />
        <button id="toPage3Btn2">← 前へ</button>
      </div>

    </div>

    <script type="module" src="./src/renderer.ts"></script>
  </body>
</html>
